<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Incoming Call...</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: #000; color: white; overflow: hidden;
        }

        /* Initial Overlay to "Unlock" Sound */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #start-btn {
            padding: 15px 30px; background: #2ecc71; border: none;
            border-radius: 25px; color: white; font-size: 1.2rem; cursor: pointer;
        }

        /* Call Screen */
        #call-screen {
            display: none; flex-direction: column; align-items: center;
            justify-content: space-between; height: 100vh; padding: 60px 20px;
            background: radial-gradient(circle at center, #4a1a05 0%, #000 100%);
        }

        .caller-info h2 { font-size: 1rem; font-weight: 400; opacity: 0.8; margin: 0; }
        .caller-info h1 { font-size: 2.8rem; font-weight: 500; margin: 10px 0; }

        .date-box { text-align: center; margin-top: 20px; }
        .day { font-size: 6rem; font-weight: 700; display: block; }
        .month { font-size: 1.5rem; letter-spacing: 10px; border-bottom: 2px solid #fff; }

        /* iOS Slider */
        .slider-section { margin-bottom: 60px; }
        .track {
            background: rgba(255,255,255,0.15); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); width: 300px; height: 80px;
            border-radius: 40px; display: flex; align-items: center; padding: 4px; position: relative;
        }
        .btn {
            width: 72px; height: 72px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; z-index: 2;
        }
        .btn svg { fill: #2ecc71; width: 35px; }
        .slide-text {
            position: absolute; width: 100%; text-align: center; left: 15px;
            color: rgba(255,255,255,0.5); font-size: 1.1rem;
        }

        /* Video Layer */
        #video-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="overlay">
        <p>You have a special surprise waiting!</p>
        <button id="start-btn">Open Surprise</button>
    </div>

    <audio id="ringtone" loop>
        <source src="ringtone.m4a" type="audio/mp4">
    </audio>

    <div id="call-screen">
        <div class="caller-info">
            <h2>Incoming Call</h2>
            <h1>Alexander</h1>
            <div class="date-box">
                <span class="day" id="day-counter">1</span>
                <span class="month">MAY</span>
            </div>
        </div>

        <div class="slider-section">
            <div class="track" id="track">
                <div class="btn" id="slider">
                    <svg viewBox="0 0 24 24"><path d="M6.62,10.79C8.06,13.62 10.38,15.94 13.21,17.38L15.41,15.18C15.69,14.9 16.08,14.82 16.43,14.93C17.55,15.3 18.75,15.5 20,15.5A1,1 0 0,1 21,16.5V20A1,1 0 0,1 20,21A17,17 0 0,1 3,4A1,1 0 0,1 4,3H7.5A1,1 0 0,1 8.5,4C8.5,5.25 8.7,6.45 9.07,7.57C9.18,7.92 9.1,8.31 8.82,8.59L6.62,10.79Z"/></svg>
                </div>
                <span class="slide-text">slide to answer</span>
            </div>
        </div>
    </div>

    <div id="video-screen">
        <video id="birthday-video" playsinline>
            <source src="gift%20image.MOV" type="video/quicktime">
        </video>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const callScreen = document.getElementById('call-screen');
        const ringtone = document.getElementById('ringtone');
        const video = document.getElementById('birthday-video');
        const dayCounter = document.getElementById('day-counter');
        const slider = document.getElementById('slider');

        startBtn.addEventListener('click', () => {
            overlay.style.display = 'none';
            callScreen.style.display = 'flex';
            
            // Prime the media (required for iOS)
            ringtone.play().then(() => ringtone.pause()); 
            video.load();

            startCounter();
        });

        function startCounter() {
            let count = 1;
            const timer = setInterval(() => {
                if (count < 4) {
                    count++;
                    dayCounter.innerText = count;
                } else {
                    clearInterval(timer);
                    ringtone.play(); // Now it will work because of the button click!
                }
            }, 1000);
        }

        // Slide logic
        let isDragging = false;
        let startX = 0;
        slider.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
        });

        slider.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            let moveX = e.touches[0].clientX - startX;
            let limit = 220; 
            if (moveX > 0 && moveX < limit) slider.style.transform = `translateX(${moveX}px)`;
            if (moveX >= limit) {
                ringtone.pause();
                callScreen.style.display = 'none';
                document.getElementById('video-screen').style.display = 'block';
                video.play();
            }
        });

        slider.addEventListener('touchend', () => {
            isDragging = false;
            slider.style.transform = `translateX(0px)`;
        });
    </script>
</body>
</html>
