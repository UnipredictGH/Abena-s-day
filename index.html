<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Call</title>
    <style>
        :root { --ios-green: #4cd964; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #000; color: white; overflow: hidden; touch-action: none; }
        
        /* Background Gradient */
        .bg { position: fixed; inset: 0; background: linear-gradient(to bottom, #2b0c04 0%, #000000 100%); z-index: -1; }
        
        /* Start Overlay */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        #start-btn { padding: 18px 40px; background: var(--ios-green); border: none; border-radius: 40px; color: white; font-size: 1.3rem; font-weight: 600; cursor: pointer; box-shadow: 0 0 20px rgba(76, 217, 100, 0.4); }

        /* Calling Screen */
        #call-screen { display: none; flex-direction: column; align-items: center; justify-content: space-between; height: 100vh; padding: 80px 0 60px 0; box-sizing: border-box; }
        .day-display { font-size: 8.5rem; font-weight: 700; margin: 0; line-height: 1; }
        .month-display { font-size: 2.2rem; letter-spacing: 12px; text-transform: uppercase; border-bottom: 2.5px solid white; padding-bottom: 5px; display: inline-block; }

        /* Slider Styles */
        .slide-section { width: 100%; display: flex; justify-content: center; margin-bottom: 40px; }
        .track { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); width: 320px; height: 84px; border-radius: 42px; display: flex; align-items: center; position: relative; border: 1px solid rgba(255, 255, 255, 0.1); }
        .thumb { width: 76px; height: 76px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; left: 4px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .thumb svg { fill: var(--ios-green); width: 38px; }
        .slide-text { width: 100%; text-align: center; font-size: 1.2rem; padding-left: 50px; color: rgba(255, 255, 255, 0.45); animation: shimmer 2s infinite; }

        @keyframes shimmer { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } }

        /* Video Layer */
        #video-screen { display: none; position: fixed; inset: 0; z-index: 3000; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <div class="bg"></div>

    <!-- Step 1: User Permission -->
    <div id="overlay">
        <button id="start-btn">fine ass shawty👇</button>
    </div>

    <!-- Hidden Audio -->
    <audio id="ringtone" loop preload="auto">
        <source src="ringtone.m4a" type="audio/mp4">
    </audio>

    <!-- Step 2: Calling Interface -->
    <div id="call-screen">
        <div style="text-align: center;">
            <h1 style="font-family: cursive; font-size: 3.5rem; margin: 0; font-weight: 100;">Happy 16th</h1>
            <p style="letter-spacing: 8px; font-size: 1.2rem; margin: 10px 0; opacity: 0.8;">ABENA</p>
            <p class="day-display" id="day-counter">25</p>
            <p class="month-display">MAY</p>
        </div>

        <div class="slide-section">
            <div class="track">
                <div class="thumb" id="slider">
                    <svg viewBox="0 0 24 24"><path d="M6.62,10.79C8.06,13.62 10.38,15.94 13.21,17.38L15.41,15.18C15.69,14.9 16.08,14.82 16.43,14.93C17.55,15.3 18.75,15.5 20,15.5A1,1 0 0,1 21,16.5V20A1,1 0 0,1 20,21A17,17 0 0,1 3,4A1,1 0 0,1 4,3H7.5A1,1 0 0,1 8.5,4C8.5,5.25 8.7,6.45 9.07,7.57C9.18,7.92 9.1,8.31 8.82,8.59L6.62,10.79Z"/></svg>
                </div>
                <span class="slide-text">slide to answer</span>
            </div>
        </div>
    </div>

    <!-- Step 3: Birthday Video -->
    <div id="video-screen">
        <video id="birthday-video" playsinline webkit-playsinline preload="auto">
            <source src="video.MOV" type="video/quicktime">
        </video>
    </div>

    <script>
        const ringtone = document.getElementById('ringtone');
        const video = document.getElementById('birthday-video');
        const slider = document.getElementById('slider');
        const dayCounter = document.getElementById('day-counter');

        // INITIAL START
        document.getElementById('start-btn').addEventListener('click', function() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('call-screen').style.display = 'flex';
            
            // Prime both media files
            ringtone.play().then(() => ringtone.pause());
            video.load(); 

            // Sequence Timing (3 seconds)
            const dates = [25, 26, 27, 28, 29, 30, 31, 1, 2, 3, 4];
            let i = 0;
            const stepTime = 3000 / dates.length;
            
            const countInterval = setInterval(() => {
                if (i < dates.length) {
                    dayCounter.innerText = dates[i++];
                } else {
                    clearInterval(countInterval);
                    ringtone.play().catch(e => console.log("Ringtone blocked"));
                }
            }, stepTime);
        });

        // SLIDER LOGIC
        let isDragging = false;
        let startX = 0;

        slider.addEventListener('touchstart', e => {
            isDragging = true;
            startX = e.touches[0].clientX;
            slider.style.transition = 'none';
        });

        document.addEventListener('touchmove', e => {
            if (!isDragging) return;
            let currentX = e.touches[0].clientX - startX;
            let limit = slider.parentElement.offsetWidth - 80;

            if (currentX > 0 && currentX <= limit) {
                slider.style.left = (currentX + 4) + 'px';
            }

            if (currentX >= limit) {
                isDragging = false;
                triggerVideo();
            }
        });

        document.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            slider.style.transition = 'left 0.3s ease';
            slider.style.left = '4px';
        });

        function triggerVideo() {
            ringtone.pause();
            document.getElementById('call-screen').style.display = 'none';
            document.getElementById('video-screen').style.display = 'block';
            
            // Start muted (highest success rate) then unmute immediately
            video.muted = true; 
            video.play().then(() => {
                video.muted = false; 
            }).catch(() => {
                // If it fails, keep it muted and wait for one tap anywhere
                document.body.addEventListener('touchstart', () => {
                    video.muted = false;
                    video.play();
                }, { once: true });
            });
        }
    </script>
</body>
</html>
